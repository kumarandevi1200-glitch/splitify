version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: split-db
    restart: always
    environment:
      POSTGRES_DB: split
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d split"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: split-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/split
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - JWT_SECRET=407f3e8293778a4812bc85e783457a4192b67f1396bfa8dc240c0b8e72c5e5aa24b7a123bc891f7d
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
