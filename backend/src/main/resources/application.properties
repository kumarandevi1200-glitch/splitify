# Database Connection (with environment variable fallbacks for Docker/Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/split}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Spring Security / Authentication settings
jwt.secret=${JWT_SECRET:407f3e8293778a4812bc85e783457a4192b67f1396bfa8dc240c0b8e72c5e5aa24b7a123bc891f7d}
# JWT access token expiry: 15 minutes (900000 ms)
jwt.access-token-expiration=900000
# JWT refresh token expiry: 7 days (604800000 ms)
jwt.refresh-token-expiration=604800000

# Actuator Health check configurations
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Logging settings
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
