# In-memory H2 Database for tests
spring.datasource.url=jdbc:h2:mem:split_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for unit tests to speed up execution and avoid dialect issues
spring.flyway.enabled=false

# Test JWT settings
jwt.secret=407f3e8293778a4812bc85e783457a4192b67f1396bfa8dc240c0b8e72c5e5aa24b7a123bc891f7d
jwt.access-token-expiration=60000
jwt.refresh-token-expiration=600000
